<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AutoSysTek Remote Support</title>

  <meta
    name="description"
    content="Download the AutoSysTek remote support tool for Windows or macOS."
  >

  <link rel="icon" href="assets/autosystek-logo-trans.png">

  <link rel="stylesheet" href="styles.css"/>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
</head>

<body>

<div class="bg"></div>

<section
  class="section"
  style="
    min-height: 100vh;
    display: flex;
    align-items: center;
  "
>

  <div
    style="
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    "
  >

    <div class="hero-card reveal">

      <img
        src="assets/autosystek-full-trans.png"
        alt="AutoSysTek"
        style="
          max-width: 260px;
          margin-bottom: 10px;
        "
      />

      <div class="section-copy">

        <span>Remote Support</span>

        <h2>
          Download the AutoSysTek support tool
        </h2>

        <p>
          Select your operating system below to begin your remote support session.
          Once downloaded, open the application and provide your ID/password to your technician.
        </p>

      </div>

      <div
        style="
          display: flex;
          gap: 16px;
          justify-content: center;
          flex-wrap: wrap;
          margin-top: 24px;
          width: 100%;
        "
      >

        <a
          href="https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.exe"
          class="btn"
        >
          Windows Download
        </a>

        <a
          href="https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          class="btn outline"
        >
          macOS Download
        </a>

      </div>

      <a
        href="index.html"
        style="
          margin-top: 28px;
          color: #94a3b8;
          font-weight: 700;
        "
      >
        ← Return to Homepage
      </a>

    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
